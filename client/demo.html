<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Keyboard RGB — WebSocket demo</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 24px; font: 14px/1.5 ui-sans-serif, system-ui, sans-serif;
    background: #0b0d12; color: #e6e8ee;
    display: flex; flex-direction: column; gap: 18px; align-items: center;
  }
  h1 { font-size: 18px; margin: 0; font-weight: 650; letter-spacing: .2px; }
  .sub { color: #8b93a7; font-size: 12px; }
  .card {
    width: min(880px, 100%); background: #12151d; border: 1px solid #232838;
    border-radius: 14px; padding: 16px 18px;
  }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  input[type=text] {
    background: #0b0d12; border: 1px solid #2b3145; color: #e6e8ee;
    border-radius: 8px; padding: 7px 10px; font: inherit; width: 230px;
  }
  input[type=range] { accent-color: #6ea8ff; }
  button {
    background: #1b2030; border: 1px solid #2b3145; color: #e6e8ee;
    border-radius: 8px; padding: 7px 12px; font: inherit; cursor: pointer;
  }
  button:hover { border-color: #3a4568; background: #222840; }
  button.on { background: #2b6cff33; border-color: #6ea8ff; color: #cfe0ff; }
  button.danger:hover { border-color: #ff6b6b; color: #ffd7d7; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #cf5b5b; }
  .dot.ok { background: #57d38c; box-shadow: 0 0 8px #57d38c88; }
  label.ctl { display: inline-flex; gap: 7px; align-items: center; color: #b9c0d2; font-size: 13px; }
  input[type=color] { width: 34px; height: 28px; border: none; background: none; padding: 0; cursor: pointer; }
  /* the on-screen mirror of the board */
  #board {
    display: grid; grid-template-columns: repeat(16, 1fr); grid-auto-rows: 34px;
    gap: 5px; margin-top: 4px;
  }
  .key {
    border-radius: 6px; background: #05060a; border: 1px solid #1a1f2c;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: #ffffffcc; text-shadow: 0 1px 2px #000a; overflow: hidden;
    user-select: none; transition: box-shadow .05s;
  }
  #src { image-rendering: pixelated; width: 320px; height: 100px; border-radius: 8px; border: 1px solid #232838; }
  .stat { font-variant-numeric: tabular-nums; color: #8b93a7; font-size: 12px; }
  .stat b { color: #cfe0ff; font-weight: 600; }
  .flex { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
</style>
</head>
<body>
  <div style="text-align:center">
    <h1>⌨️ Keyboard RGB — WebSocket demo</h1>
    <div class="sub">Draws to a 16×5 canvas and streams the pixels to your keyboard as binary frames.</div>
  </div>

  <div class="card">
    <div class="row">
      <span id="dot" class="dot"></span>
      <input id="url" type="text" value="ws://127.0.0.1:8787" />
      <button id="connect">Connect</button>
      <span id="devinfo" class="stat"></span>
    </div>
  </div>

  <div class="card">
    <div class="row" style="justify-content:space-between">
      <div class="row" id="modes"></div>
      <button id="off" class="danger">Off</button>
    </div>
    <div class="row" style="margin-top:12px">
      <label class="ctl">A <input type="color" id="c1" value="#009bde" /></label>
      <label class="ctl">B <input type="color" id="c2" value="#ff2ea6" /></label>
      <label class="ctl">Speed <input type="range" id="speed" min="0" max="200" value="60" /></label>
      <label class="ctl">Brightness <input type="range" id="bri" min="0" max="100" value="100" /></label>
      <label class="ctl">Max FPS <input type="range" id="maxfps" min="5" max="60" value="30" /><b id="maxfpsv" style="color:#cfe0ff;width:22px;text-align:right">30</b></label>
    </div>
  </div>

  <div class="card">
    <div class="flex">
      <div>
        <div class="sub" style="margin-bottom:6px">Source canvas (16×5, upscaled)</div>
        <canvas id="src" width="16" height="5"></canvas>
      </div>
      <div style="flex:1; min-width:320px">
        <div class="sub" style="margin-bottom:6px">Keyboard mapping (what the board shows)</div>
        <div id="board"></div>
      </div>
    </div>
    <div class="flex" style="margin-top:12px">
      <span class="stat">status: <b id="s_status">disconnected</b></span>
      <span class="stat">keys: <b id="s_keys">–</b></span>
      <span class="stat">fps: <b id="s_fps">0</b></span>
      <span class="stat">frames sent: <b id="s_frames">0</b></span>
      <span class="stat" id="s_hint" style="color:#8b93a7">Paint mode: click / drag the source canvas.</span>
    </div>
  </div>

<script>
"use strict";
const $ = (id) => document.getElementById(id);
const MODES = ["rainbow", "plasma", "solid", "gradient", "paint"];
let mode = "rainbow";

// ---- state ----------------------------------------------------------------
let ws = null, connected = false, schema = null, keys = null, frameBuf = null;
let frames = 0, t = 0, lastT = performance.now(), fpsEMA = 0;
// Throttle the actual keyboard sends (the "Max FPS" slider) independently of
// the on-screen preview, which still animates at the display's full refresh.
let lastSend = 0, sendEMA = 0;
const GW = 16, GH = 5;
const paint = document.createElement("canvas"); paint.width = GW; paint.height = GH;
const pctx = paint.getContext("2d");
pctx.fillStyle = "#000"; pctx.fillRect(0, 0, GW, GH);

const src = $("src"), sctx = src.getContext("2d", { willReadFrequently: true });

// ---- mode buttons ---------------------------------------------------------
const modesEl = $("modes");
MODES.forEach((m) => {
  const b = document.createElement("button");
  b.textContent = m; b.className = m === mode ? "on" : "";
  b.onclick = () => { mode = m; [...modesEl.children].forEach(c => c.className = c.textContent === m ? "on" : ""); };
  modesEl.appendChild(b);
});

// ---- color helpers --------------------------------------------------------
const hex2rgb = (h) => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
function hsv(h, s, v) {
  const i = Math.floor(h*6)%6, f = h*6 - Math.floor(h*6);
  const p=v*(1-s), q=v*(1-f*s), tt=v*(1-(1-f)*s);
  const [r,g,b] = [[v,tt,p],[q,v,p],[p,v,tt],[p,q,v],[tt,p,v],[v,p,q]][i];
  return [r*255|0, g*255|0, b*255|0];
}

// ---- draw the current mode onto the 16x5 source canvas --------------------
function drawSource(time) {
  if (mode === "paint") { sctx.drawImage(paint, 0, 0); return; }
  const img = sctx.createImageData(GW, GH);
  const [a1,a2,a3] = hex2rgb($("c1").value), [b1,b2,b3] = hex2rgb($("c2").value);
  for (let y=0; y<GH; y++) for (let x=0; x<GW; x++) {
    let r,g,b;
    if (mode === "rainbow")      [r,g,b] = hsv(((x/GW) + time*0.1) % 1, 1, 1);
    else if (mode === "solid")   [r,g,b] = [a1,a2,a3];
    else if (mode === "gradient"){ const u=x/(GW-1); r=a1+(b1-a1)*u; g=a2+(b2-a2)*u; b=a3+(b3-a3)*u; }
    else { // plasma
      const v = 0.5 + 0.5*Math.sin(x*0.6 + time*2) * Math.cos(y*0.9 - time*1.3)
                    + 0.5*Math.sin((x+y)*0.4 + time*1.7);
      [r,g,b] = hsv((v*0.5 + time*0.05) % 1, 0.9, Math.min(1, Math.abs(v)));
    }
    const o=(y*GW+x)*4; img.data[o]=r; img.data[o+1]=g; img.data[o+2]=b; img.data[o+3]=255;
  }
  sctx.putImageData(img, 0, 0);
}

// ---- build the on-screen key grid from the schema -------------------------
const boardEl = $("board");
const keyEls = {};
function buildBoard() {
  boardEl.innerHTML = ""; Object.keys(keyEls).forEach(k => delete keyEls[k]);
  for (const k of keys) {
    const d = document.createElement("div");
    d.className = "key";
    d.style.gridColumn = (k.col + 1); d.style.gridRow = (k.row + 1);
    d.textContent = k.name.length > 5 ? k.name.slice(0,4) : k.name;
    boardEl.appendChild(d); keyEls[k.index] = d;
  }
}

// ---- per-frame: sample canvas -> build 204B frame -> send + mirror --------
function tick() {
  const now = performance.now(), dt = (now - lastT)/1000; lastT = now;
  const speed = +$("speed").value / 60, bri = +$("bri").value / 100;
  t += dt * speed;
  drawSource(t);
  if (keys) {
    const data = sctx.getImageData(0, 0, GW, GH).data;
    for (const k of keys) {
      const o = (k.row*GW + k.col) * 4;
      const r = data[o]*bri|0, g = data[o+1]*bri|0, b = data[o+2]*bri|0;
      const fi = k.index*3; frameBuf[fi]=r; frameBuf[fi+1]=g; frameBuf[fi+2]=b;
      const el = keyEls[k.index];
      if (el) { el.style.background = `rgb(${r},${g},${b})`;
                el.style.boxShadow = (r+g+b>60) ? `0 0 7px rgb(${r},${g},${b})` : "none"; }
    }
    const sendInterval = 1000 / (+$("maxfps").value);
    if (connected && ws.readyState === 1 && now - lastSend >= sendInterval) {
      ws.send(frameBuf); frames++;
      sendEMA = sendEMA*0.9 + (1000/(now-lastSend))*0.1; lastSend = now;
    }
  }
  fpsEMA = fpsEMA*0.9 + (1/dt)*0.1;
  $("s_fps").textContent = `${fpsEMA.toFixed(0)} render / ${sendEMA.toFixed(0)} send`;
  $("s_frames").textContent = frames;
  requestAnimationFrame(tick);
}

// ---- WebSocket ------------------------------------------------------------
function setStatus(ok, text) {
  connected = ok; $("dot").className = "dot" + (ok ? " ok" : "");
  $("s_status").textContent = text;
}
function connect() {
  if (ws) { ws.onclose = null; ws.close(); }
  setStatus(false, "connecting…");
  ws = new WebSocket($("url").value);
  ws.binaryType = "arraybuffer";
  ws.onopen = () => { setStatus(true, "connected"); $("connect").textContent = "Disconnect"; };
  ws.onclose = () => { setStatus(false, "disconnected"); $("connect").textContent = "Connect"; };
  ws.onerror = () => setStatus(false, "error");
  ws.onmessage = (ev) => {
    if (typeof ev.data !== "string") return;
    const m = JSON.parse(ev.data);
    if (m.type === "schema") {
      schema = m; keys = m.keys; frameBuf = new Uint8Array(m.keyCount * 3);
      $("devinfo").textContent = `${m.device} · ${m.keyCount} keys`;
      $("s_keys").textContent = m.keyCount; buildBoard();
    } else if (m.type === "error") {
      $("s_hint").textContent = "server error: " + m.message;
    }
  };
}
$("connect").onclick = () => (connected ? (ws.onclose=null, ws.close(), setStatus(false,"disconnected"), $("connect").textContent="Connect") : connect());
$("off").onclick = () => { pctx.fillStyle="#000"; pctx.fillRect(0,0,GW,GH);
  if (connected && ws.readyState===1) ws.send(JSON.stringify({type:"clear"})); mode="paint";
  [...modesEl.children].forEach(c => c.className = c.textContent==="paint" ? "on":""); };

// ---- painting on the source canvas ----------------------------------------
let painting = false;
function paintAt(ev) {
  const rect = src.getBoundingClientRect();
  const x = Math.floor((ev.clientX - rect.left) / rect.width * GW);
  const y = Math.floor((ev.clientY - rect.top) / rect.height * GH);
  if (x<0||y<0||x>=GW||y>=GH) return;
  pctx.fillStyle = $("c1").value; pctx.fillRect(x, y, 1, 1);
  if (mode !== "paint") { mode = "paint"; [...modesEl.children].forEach(c => c.className = c.textContent==="paint"?"on":""); }
}
src.addEventListener("mousedown", (e) => { painting=true; paintAt(e); });
src.addEventListener("mousemove", (e) => { if (painting) paintAt(e); });
window.addEventListener("mouseup", () => painting=false);

$("maxfps").addEventListener("input", () => $("maxfpsv").textContent = $("maxfps").value);

connect();
requestAnimationFrame(tick);
</script>
</body>
</html>
